<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RefSwap — Clickable Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #FBFAF8; }
  body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }
  input::placeholder { color: #A6A199; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #E2DED6; border-radius: 10px; border: 3px solid #FBFAF8; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideIn { from { transform: translateX(28px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes toastIn { from { transform: translate(-50%, 10px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

  /* responsive */
  @media (max-width: 880px) {
    .browse-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .mywatch-grid { grid-template-columns: 1fr !important; }
    .chat-wrap { grid-template-columns: 1fr !important; }
    .chat-list { display: none !important; }
    .desk-nav { display: none !important; }
    .tab-bar { display: flex !important; }
    #root { padding-bottom: 76px; }
  }
  @media (max-width: 560px) {
    .browse-grid { grid-template-columns: 1fr !important; }
    .match-cta { display: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#FBFAF8"/>
    <circle cx="50" cy="50" r="22" fill="none" stroke="#A9823F" stroke-width="3"/>
    <circle cx="50" cy="50" r="12" fill="none" stroke="#D4CFC5" stroke-width="2"/>
    <rect x="46" y="20" width="8" height="9" rx="2" fill="#A9823F"/>
    <rect x="46" y="71" width="8" height="9" rx="2" fill="#A9823F"/>
    <text x="50" y="54" font-family="Georgia, serif" font-size="11" fill="#1C1B19" text-anchor="middle">RS</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="proto-data.jsx"></script>
<script type="text/babel" src="proto-shell.jsx"></script>
<script type="text/babel" src="proto-browse.jsx"></script>
<script type="text/babel" src="proto-other.jsx"></script>
<script type="text/babel" src="proto-create.jsx"></script>
<script type="text/babel" src="proto-app.jsx"></script>
</body>
</html>
